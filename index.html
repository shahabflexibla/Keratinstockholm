<!DOCTYPE html>

<head>

<title>Keratin & Fransar Stockholm</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f8f5f2;
}

nav {
  display:flex;

  padding:20px;
  background:white;
}

nav a {
  margin-left:20px;

}

.hero {

  justify-content:center;

  margin:10px;

}

  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));

.card {
  background:white;
  padding:10px;

}

.card iframe {
  width:100%;
  height:400px;
  border:none;
  border-radius:10px;

footer {
