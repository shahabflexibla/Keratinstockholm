<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Keratin Stockholm</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0d0d0d;
      color:white;
    }

    .hero {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      position:relative;
    }

    /* TEST BILD DIREKT (för att säkerställa att det funkar) */
    .hero::before {
      content:"";
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      width:300px;
      height:300px;

      background:url('https://via.placeholder.com/300') no-repeat center;
      background-size:contain;
      opacity:0.4;
    }

    .overlay {
      position:relative;
      z-index:2;
    }

    .btn {
      background:#E1306C;
      padding:15px 25px;
      border-radius:10px;
      text-decoration:none;
      color:white;
      display:inline-block;
      margin-top:20px;
    }
  </style>
</head>

<body>

<section class="hero">
  <div class="overlay">
    <h1>Keratin Stockholm</h1>
    <p>Test sida</p>

    <a href="https://instagram.com/keratin.sthlm" target="_blank" class="btn">
      Instagram
    </a>
  </div>
</section>

</body>
</html>
